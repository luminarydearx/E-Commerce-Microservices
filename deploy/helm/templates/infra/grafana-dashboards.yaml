{{- if .Values.grafana.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.grafana.dashboards.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  ecommerce-overview.json: |-
    {
      "title": "E-Commerce Services Overview",
      "schemaVersion": 39,
      "refresh": "10s",
      "panels": [
        {
          "title": "Request Rate by Service",
          "type": "timeseries",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {"expr": "sum(rate(http_server_requests_seconds_count[5m])) by (job)", "legendFormat": "{{job}}"}
          ]
        },
        {
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {"expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) by (job)", "legendFormat": "{{job}}"}
          ]
        },
        {
          "title": "P95 Latency",
          "type": "timeseries",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job))", "legendFormat": "{{job}}"}
          ]
        },
        {
          "title": "Payment Success Rate",
          "type": "stat",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
          "targets": [
            {"expr": "1 - (rate(payment_failed_total[5m]) / rate(payment_total[5m]))"}
          ]
        }
      ]
    }

  ecommerce-business.json: |-
    {
      "title": "E-Commerce Business Metrics",
      "schemaVersion": 39,
      "panels": [
        {
          "title": "Orders per minute",
          "type": "stat",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "sum(rate(orders_created_total[1m])) * 60"}]
        },
        {
          "title": "Revenue per minute (IDR)",
          "type": "stat",
          "datasource": {"type": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "sum(rate(payment_succeeded_total[1m]) * 97000) * 60"}]
        }
      ]
    }
{{- end }}
